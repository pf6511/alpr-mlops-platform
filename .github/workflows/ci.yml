name: CI

on:
  push:
    branches:
      - main
      - dev
      - micka2
      - "feature/**"
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Installer les dépendances projet
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Installer outils CI
        run: |
          pip install pytest ruff

      - name: Vérifier la syntaxe Python
        run: python -m compileall .

      - name: Lint
        run: ruff check .github tests airflow
      
      - name: Créer le fichier .env CI
        run: echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > docker/.env

      - name: Build containers
        run: docker compose -f docker/docker-compose.yml build

      - name: Start containers
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for service
        run: |
          echo "Waiting for service..."
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:7860 || true)
            if [ "$STATUS" = "200" ]; then
              echo "Service is up! (HTTP $STATUS)"
              exit 0
            fi
            echo "  attempt $i/20 — HTTP $STATUS"
            sleep 5
          done
          echo "Service failed to start"
          docker compose -f docker/docker-compose.yml logs alpr-engine --tail 50
          exit 1

      - name: Lancer les tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pytest -q

      - name: Stop containers
        if: always()
        run: docker compose -f docker/docker-compose.yml down