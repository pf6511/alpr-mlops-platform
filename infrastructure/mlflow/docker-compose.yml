services:
  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - ./mlruns:/app/mlruns
      - ./data:/app/data
    command: >
      bash -c "pip install mlflow boto3 psycopg2-binary &&
      mkdir -p /app/mlruns /app/data &&
      mlflow server
      --backend-store-uri sqlite:////app/data/mlflow.db
      --default-artifact-root /app/mlruns
      --host 0.0.0.0
      --port 8080
      --allowed-hosts host.docker.internal,localhost,127.0.0.1"