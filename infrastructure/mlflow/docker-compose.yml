version: "3.8"

services:
  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    working_dir: /app
    ports:
      - "8080:8080"

    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db

    command: >
      bash -c "
      pip install mlflow boto3 psycopg2-binary &&
      mlflow server
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root /app/mlruns
        --host 0.0.0.0
        --port 8080
      "