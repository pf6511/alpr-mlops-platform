{{- /*
ALPR Engine - Kubernetes Service
Expose les services ALPR (Gradio, Ray Serve, MLflow)
*/ -}}

---
# ═══════════════════════════════════════════════════════════════════════════════
# SERVICE: ALPR Gradio UI
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alpr-engine.fullname" . }}-gradio
  labels:
    {{- include "alpr-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: gradio
  {{- with .Values.gradio.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.gradio.service.type }}
  ports:
    - port: {{ .Values.gradio.service.port }}
      targetPort: gradio
      protocol: TCP
      name: http
      {{- if and (eq .Values.gradio.service.type "NodePort") .Values.gradio.service.nodePort }}
      nodePort: {{ .Values.gradio.service.nodePort }}
      {{- end }}
  selector:
    {{- include "alpr-engine.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gradio

{{- if .Values.rayServe.enabled }}
---
# ═══════════════════════════════════════════════════════════════════════════════
# SERVICE: Ray Serve API
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alpr-engine.fullname" . }}-ray
  labels:
    {{- include "alpr-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: ray-serve
  {{- with .Values.rayServe.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.rayServe.service.type }}
  ports:
    - port: {{ .Values.rayServe.service.port }}
      targetPort: ray-serve
      protocol: TCP
      name: http
      {{- if and (eq .Values.rayServe.service.type "NodePort") .Values.rayServe.service.nodePort }}
      nodePort: {{ .Values.rayServe.service.nodePort }}
      {{- end }}
    - port: 8265
      targetPort: 8265
      protocol: TCP
      name: ray-dashboard
  selector:
    {{- include "alpr-engine.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ray-serve
{{- end }}

{{- if .Values.mlflow.enabled }}
---
# ═══════════════════════════════════════════════════════════════════════════════
# SERVICE: MLflow Tracking Server
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alpr-engine.fullname" . }}-mlflow
  labels:
    {{- include "alpr-engine.labels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
  {{- with .Values.mlflow.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.mlflow.service.type }}
  ports:
    - port: {{ .Values.mlflow.service.port }}
      targetPort: mlflow
      protocol: TCP
      name: http
      {{- if and (eq .Values.mlflow.service.type "NodePort") .Values.mlflow.service.nodePort }}
      nodePort: {{ .Values.mlflow.service.nodePort }}
      {{- end }}
  selector:
    {{- include "alpr-engine.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mlflow
{{- end }}

{{- if .Values.ingress.enabled }}
---
# ═══════════════════════════════════════════════════════════════════════════════
# INGRESS: External Access
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "alpr-engine.fullname" . }}
  labels:
    {{- include "alpr-engine.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          # Gradio UI (main)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "alpr-engine.fullname" $ }}-gradio
                port:
                  number: {{ $.Values.gradio.service.port }}
          {{- if $.Values.rayServe.enabled }}
          # Ray Serve API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "alpr-engine.fullname" $ }}-ray
                port:
                  number: {{ $.Values.rayServe.service.port }}
          {{- end }}
          {{- if $.Values.mlflow.enabled }}
          # MLflow UI
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: {{ include "alpr-engine.fullname" $ }}-mlflow
                port:
                  number: {{ $.Values.mlflow.service.port }}
          {{- end }}
    {{- end }}
{{- end }}

---
# ═══════════════════════════════════════════════════════════════════════════════
# CONFIGMAP: Application Configuration
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alpr-engine.fullname" . }}-config
  labels:
    {{- include "alpr-engine.labels" . | nindent 4 }}
data:
  ENV: {{ .Values.env | quote }}
  
  # Database
  DB_MODE: {{ .Values.database.mode | quote }}
  {{- if eq .Values.database.mode "postgres" }}
  DB_HOST: {{ .Values.database.host | quote }}
  DB_PORT: {{ .Values.database.port | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  {{- end }}
  
  # Storage
  STORAGE_MODE: {{ .Values.storage.mode | quote }}
  {{- if eq .Values.storage.mode "s3" }}
  S3_ENDPOINT_URL: {{ .Values.storage.endpoint | quote }}
  S3_REGION: {{ .Values.storage.region | quote }}
  S3_BUCKET_DATASET: {{ .Values.storage.buckets.dataset | quote }}
  S3_BUCKET_CAPTURES: {{ .Values.storage.buckets.captures | quote }}
  S3_BUCKET_ARTIFACTS: {{ .Values.storage.buckets.artifacts | quote }}
  {{- end }}
  
  # MLflow
  {{- if .Values.mlflow.enabled }}
  MLFLOW_TRACKING_URI: "http://{{ include "alpr-engine.fullname" . }}-mlflow:{{ .Values.mlflow.service.port }}"
  MLFLOW_EXPERIMENT_NAME: {{ .Values.mlflow.experimentName | quote }}
  {{- end }}
  
  # Ray
  {{- if .Values.rayServe.enabled }}
  RAY_MODE: "serve"
  RAY_ADDRESS: "auto"
  {{- else }}
  RAY_MODE: "local"
  {{- end }}
  
  # Gradio
  GRADIO_SERVER_NAME: "0.0.0.0"
  GRADIO_SERVER_PORT: {{ .Values.gradio.port | quote }}

---
# ═══════════════════════════════════════════════════════════════════════════════
# SECRET: Sensitive Configuration
# ═══════════════════════════════════════════════════════════════════════════════
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alpr-engine.fullname" . }}-secrets
  labels:
    {{- include "alpr-engine.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.database.password }}
  DB_PASSWORD: {{ .Values.database.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.database.user }}
  DB_USER: {{ .Values.database.user | b64enc | quote }}
  {{- end }}
  {{- if .Values.storage.accessKey }}
  S3_ACCESS_KEY: {{ .Values.storage.accessKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.storage.secretKey }}
  S3_SECRET_KEY: {{ .Values.storage.secretKey | b64enc | quote }}
  {{- end }}
{{- end }}

---
# ═══════════════════════════════════════════════════════════════════════════════
# PVC: Model Storage (si pas de S3)
# ═══════════════════════════════════════════════════════════════════════════════
{{- if and .Values.persistence.enabled (eq .Values.storage.mode "local") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "alpr-engine.fullname" . }}-models
  labels:
    {{- include "alpr-engine.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
