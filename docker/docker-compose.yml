# ═══════════════════════════════════════════════════════════════════════════════
# ALPR Engine - Docker Compose (LEAD Edition)
# Stack complète: App + PostgreSQL + MLflow + MinIO (S3)
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # ALPR Engine (Application principale)
  # ─────────────────────────────────────────────────────────────────────────────
  alpr-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: alpr-engine
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - ENV=production
      - PYTHONPATH=/app
      - DB_MODE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=alpr
      - DB_USER=alpr
      - DB_PASSWORD=${DB_PASSWORD:-alpr_secret}
      - STORAGE_MODE=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET_CAPTURES=alpr-captures
      - S3_BUCKET_DATASET=alpr-dataset
      - S3_REGION=us-east-1
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - RAY_MODE=local
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    volumes:
      - ../models:/app/models:ro
      - ../outputs:/app/outputs
      - alpr-data:/app/data
          # AJOUTER CES LIGNES pour dev :
      - ../src:/app/src:ro
      - ../configs:/app/configs:ro
      - ../pipelines:/app/pipelines:ro
      - ../app.py:/app/app.py:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mlflow:
        condition: service_started
    networks:
      - alpr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL (Base de données)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: alpr-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=alpr
      - POSTGRES_USER=alpr
      - POSTGRES_PASSWORD=${DB_PASSWORD:-alpr_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - alpr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpr -d alpr"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────────
  # MinIO (S3-compatible storage)
  # ─────────────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: alpr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - alpr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Créer les buckets au démarrage
  minio-init:
    image: minio/mc:latest
    container_name: alpr-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing myminio/alpr-captures;
      mc mb --ignore-existing myminio/alpr-dataset;
      mc mb --ignore-existing myminio/mlflow;
      exit 0;
      "
    networks:
      - alpr-network

  # ─────────────────────────────────────────────────────────────────────────────
  # MLflow (Tracking & Model Registry)
  # ─────────────────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: alpr-mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://alpr:${DB_PASSWORD:-alpr_secret}@postgres:5432/alpr
      --default-artifact-root s3://mlflow/
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - alpr-network

  # ─────────────────────────────────────────────────────────────────────────────
  # Airflow (Orchestration - optionnel)
  # ─────────────────────────────────────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.7.3-python3.10
    container_name: alpr-airflow
    restart: unless-stopped
    profiles:
      - full
    command: standalone
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://alpr:${DB_PASSWORD:-alpr_secret}@postgres:5432/alpr
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=false
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_PASSWORD:-admin}
    volumes:
      - ../airflow/dags:/opt/airflow/dags:ro
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alpr-network

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  postgres-data:
  minio-data:
  alpr-data:
  airflow-logs:

# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  alpr-network:
    driver: bridge
